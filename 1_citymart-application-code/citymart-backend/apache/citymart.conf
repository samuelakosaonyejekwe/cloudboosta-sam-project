# CityMart Online (Backend) - Apache VirtualHost
# Notes:
# - Public HTTPS is terminated at the PUBLIC ALB using ACM + Route 53 (customer-facing).
# - This Apache vhost is for the BACKEND servers behind the INTERNAL ALB (typically HTTP:80).
# - Backend serves API endpoints under /api/* (e.g., /api/health, /api/products).

<VirtualHost *:80>
    ServerName citymart-backend

    # Backend code is expected to be deployed to /var/www/html
    DocumentRoot /var/www/html

    # Security + sane defaults
    ServerTokens Prod
    ServerSignature Off

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Serve the API endpoints from /var/www/html/api
    Alias /api /var/www/html/api

    <Directory /var/www/html/api>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Basic security headers (OK even behind an internal ALB)
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Logging
    ErrorLog  ${APACHE_LOG_DIR}/citymart_error.log
    CustomLog ${APACHE_LOG_DIR}/citymart_access.log combined
</VirtualHost>
